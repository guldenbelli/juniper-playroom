<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ffe9d6">
<title>Animals</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden; position: fixed; inset: 0;
    background: linear-gradient(180deg, #ffe9d6 0%, #fff3e0 45%, #d8f5c8 46%, #b8e6a3 100%);
    touch-action: none; overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent;
    font-family: ui-rounded, -apple-system, "Segoe UI", system-ui, sans-serif;
  }
  .js-chip { background: rgba(0,0,0,.08) !important; }
  .scenery { position: absolute; pointer-events: none; line-height: 1; }
  #stage {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4vmin;
  }
  #animal {
    font-size: 42vmin; line-height: 1;
    filter: drop-shadow(0 10px 24px rgba(80,60,20,.25));
    will-change: transform;
  }
  #animal.bounce { animation: bounce .7s cubic-bezier(.3,1.6,.4,1); }
  @keyframes bounce {
    0% { transform: scale(1); }
    30% { transform: scale(1.25) rotate(-5deg); }
    55% { transform: scale(.92) rotate(4deg); }
    100% { transform: scale(1) rotate(0); }
  }
  #animal.enter { animation: enter .5s cubic-bezier(.2,1.4,.4,1); }
  @keyframes enter { from { transform: scale(0) rotate(-15deg); } to { transform: scale(1) rotate(0); } }
  #word {
    font-size: clamp(34px, 8vmin, 64px); font-weight: 800; color: #6b4d2e;
    background: rgba(255,255,255,.65); padding: 8px 28px; border-radius: 999px;
    box-shadow: 0 6px 18px rgba(80,60,20,.15);
    transition: transform .25s cubic-bezier(.3,1.6,.4,1);
  }
  #word.pop { transform: scale(1.18); }
</style>
</head>
<body>
<div id="stage">
  <div id="animal">🐮</div>
  <div id="word">Tap me!</div>
</div>
<script src="common.js"></script>
<script>
(function () {
  "use strict";
  var ANIMALS = [
    { e: "🐮", say: "Moo!",        pitch: 0.6, rate: 0.6 },
    { e: "🐶", say: "Woof woof!",  pitch: 1.2, rate: 1.0 },
    { e: "🐱", say: "Meow!",       pitch: 1.8, rate: 0.8 },
    { e: "🐥", say: "Cheep cheep!",pitch: 2.0, rate: 1.1 },
    { e: "🦆", say: "Quack quack!",pitch: 1.4, rate: 1.0 },
    { e: "🦁", say: "Roar!",       pitch: 0.4, rate: 0.55 },
    { e: "🐑", say: "Baa!",        pitch: 1.1, rate: 0.6 },
    { e: "🐴", say: "Neigh!",      pitch: 1.0, rate: 0.8 },
    { e: "🐸", say: "Ribbit!",     pitch: 0.8, rate: 0.9 },
    { e: "🐷", say: "Oink oink!",  pitch: 1.3, rate: 0.9 },
    { e: "🦉", say: "Hoo hoo!",    pitch: 0.7, rate: 0.6 },
    { e: "🐝", say: "Bzzzz!",      pitch: 1.5, rate: 0.7 }
  ];

  /* scenery */
  [["☁️", 8, 8, 9], ["☁️", 70, 5, 12], ["☀️", 86, 9, 11],
   ["🌸", 6, 88, 6], ["🌼", 90, 86, 6], ["🌷", 16, 92, 6], ["🌻", 78, 92, 7]
  ].forEach(function (s) {
    var d = document.createElement("div");
    d.className = "scenery";
    d.textContent = s[0];
    d.style.left = s[1] + "%"; d.style.top = s[2] + "%";
    d.style.fontSize = s[3] + "vmin";
    document.body.appendChild(d);
  });

  var animalEl = document.getElementById("animal");
  var wordEl = document.getElementById("word");
  var current = 0;
  var busy = false;

  function boing() {
    JS.tone({ freq: 240, slide: 480, type: "triangle", dur: 0.22, vol: 0.14 });
    JS.tone({ freq: 480, slide: 320, type: "sine", dur: 0.18, vol: 0.07, delay: 0.16 });
  }

  function nextIndex() {
    var n;
    do { n = (Math.random() * ANIMALS.length) | 0; } while (n === current);
    return n;
  }

  document.body.addEventListener("pointerdown", function (e) {
    if (busy) return;
    busy = true;
    var a = ANIMALS[current];

    animalEl.classList.remove("enter");
    animalEl.classList.add("bounce");
    wordEl.textContent = a.say;
    wordEl.classList.add("pop");
    boing();
    JS.speak(a.say, { pitch: a.pitch, rate: a.rate });
    JS.burst(e.clientX, e.clientY, { count: 6, colors: ["#ffd6a5", "#ffb3c6", "#fdffb6"], sizeMin: 10, sizeMax: 20 });

    setTimeout(function () {
      animalEl.classList.remove("bounce");
      wordEl.classList.remove("pop");
      current = nextIndex();
      animalEl.textContent = ANIMALS[current].e;
      animalEl.classList.add("enter");
      JS.tone({ freq: 660, type: "triangle", dur: 0.15, vol: 0.08 });
      setTimeout(function () { busy = false; }, 250);
    }, 1100);
  });

  JS.makeChips();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#8fd3ff">
<title>Day &amp; Night</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden; position: fixed; inset: 0;
    touch-action: none; overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent;
  }
  #world {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, #8fd3ff 0%, #cdeeff 70%, #b8e6a3 71%, #97d67f 100%);
    transition: background 1.1s ease;
  }
  #world.night {
    background: linear-gradient(180deg, #0c0a26 0%, #1c1444 70%, #16321e 71%, #0f2415 100%);
  }
  .item {
    position: absolute; line-height: 1; pointer-events: none;
    transition: opacity 1s ease, transform 1.1s cubic-bezier(.3,1,.4,1);
    will-change: opacity, transform;
  }
  .day-only { opacity: 1; }
  .night-only { opacity: 0; }
  #world.night .day-only { opacity: 0; }
  #world.night .night-only { opacity: 1; }

  #sun { left: 10%; top: 8%; font-size: 16vmin; transform: translateY(0) rotate(0); }
  #world.night #sun { transform: translateY(60vh) rotate(120deg); }
  #moon { right: 10%; top: 60%; font-size: 14vmin; transform: translateY(0); }
  #world.night #moon { transform: translateY(-48vh); }

  .cloud { animation: drift var(--cd) linear infinite; }
  @keyframes drift { from { margin-left: -10vw; } to { margin-left: 110vw; } }

  .twinkler { animation: tw 2s ease-in-out infinite alternate; }
  @keyframes tw { from { filter: brightness(.7); transform: scale(.9); } to { filter: brightness(1.3); transform: scale(1.1); } }

  .firefly { animation: fly var(--fd) ease-in-out infinite alternate; }
  @keyframes fly {
    from { transform: translate(0, 0); }
    to { transform: translate(var(--fx), var(--fy)); }
  }
</style>
</head>
<body>
<div id="world"></div>
<script src="common.js"></script>
<script>
(function () {
  "use strict";
  var world = document.getElementById("world");

  function add(emoji, opts) {
    var d = document.createElement("div");
    d.className = "item " + (opts.cls || "");
    if (opts.id) d.id = opts.id;
    d.textContent = emoji;
    d.style.left = opts.l !== undefined ? opts.l + "%" : "";
    d.style.right = opts.r !== undefined ? opts.r + "%" : "";
    d.style.top = opts.t + "%";
    d.style.fontSize = opts.s + "vmin";
    if (opts.vars) for (var k in opts.vars) d.style.setProperty(k, opts.vars[k]);
    world.appendChild(d);
    return d;
  }

  /* sun & moon swap places */
  add("☀️", { id: "sun", cls: "day-only", l: 10, t: 8, s: 16 });
  add("🌙", { id: "moon", cls: "night-only", r: 10, t: 60, s: 14 });

  /* daytime world */
  add("☁️", { cls: "day-only cloud", l: 0, t: 12, s: 11, vars: { "--cd": "46s" } });
  add("☁️", { cls: "day-only cloud", l: 0, t: 26, s: 8, vars: { "--cd": "62s" } });
  add("🐦", { cls: "day-only", l: 64, t: 20, s: 6 });
  add("🦋", { cls: "day-only", l: 30, t: 48, s: 6 });
  add("🌻", { cls: "day-only", l: 12, t: 80, s: 9 });
  add("🌷", { cls: "day-only", l: 78, t: 83, s: 8 });
  add("🐰", { cls: "day-only", l: 48, t: 78, s: 10 });

  /* nighttime world */
  var starSpots = [[14, 10], [30, 22], [52, 8], [70, 16], [86, 26], [42, 30], [22, 38], [62, 34]];
  starSpots.forEach(function (p, i) {
    var s = add("⭐", { cls: "night-only twinkler", l: p[0], t: p[1], s: 3.5 });
    s.style.animationDelay = (i * 0.3) + "s";
  });
  add("🦉", { cls: "night-only", l: 64, t: 56, s: 9 });
  add("🦔", { cls: "night-only", l: 24, t: 80, s: 8 });
  for (var i = 0; i < 5; i++) {
    add("✨", { cls: "night-only firefly", l: 15 + i * 16, t: 55 + (i % 3) * 12, s: 3,
      vars: { "--fd": (2 + i * 0.5) + "s", "--fx": JS.rand(-40, 40) + "px", "--fy": JS.rand(-30, 30) + "px" } });
  }

  var night = false;
  var busy = false;

  function chirp() { /* morning birds */
    [1318, 1568, 2093].forEach(function (f, i) {
      JS.tone({ freq: f, slide: f * 1.18, type: "sine", dur: 0.12, vol: 0.08, delay: i * 0.13 });
    });
  }
  function hoot() { /* sleepy owl */
    JS.tone({ freq: 330, slide: 290, type: "sine", dur: 0.3, vol: 0.14, attack: 0.06 });
    JS.tone({ freq: 330, slide: 270, type: "sine", dur: 0.4, vol: 0.14, attack: 0.06, delay: 0.4 });
  }

  document.body.addEventListener("pointerdown", function (e) {
    if (busy) return;
    busy = true;
    setTimeout(function () { busy = false; }, 900);

    night = !night;
    world.classList.toggle("night", night);
    if (night) {
      hoot();
      JS.burst(e.clientX, e.clientY, { count: 6, chars: ["⭐", "✨"], colors: ["#fdffb6", "#ffffff"], sizeMin: 12, sizeMax: 22 });
    } else {
      chirp();
      JS.burst(e.clientX, e.clientY, { count: 6, chars: ["☀️", "🌼", "✨"], colors: ["#ffe066"], sizeMin: 12, sizeMax: 22 });
    }
  });

  JS.makeChips();
})();
</script>
</body>
</html>

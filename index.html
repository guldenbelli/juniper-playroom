<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Playroom">
<meta name="theme-color" content="#0e0b2a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Juniper's Playroom</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden; position: fixed; inset: 0;
    background: linear-gradient(180deg, #0e0b2a 0%, #1a1340 55%, #2c1b54 100%);
    touch-action: none; overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent;
    font-family: ui-rounded, -apple-system, "Segoe UI", system-ui, sans-serif;
  }
  .star { position: absolute; border-radius: 50%; background: #fff; opacity: .5;
    animation: twinkle var(--tw) ease-in-out infinite alternate; }
  @keyframes twinkle { from { opacity: .15; } to { opacity: .7; } }

  #wrap {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center;
    padding: calc(env(safe-area-inset-top, 0px) + 18px) 18px calc(env(safe-area-inset-bottom, 0px) + 18px);
    gap: 14px;
  }
  h1 {
    color: #f3eeff; font-weight: 800; letter-spacing: .02em;
    font-size: clamp(26px, 4.5vw, 42px); text-shadow: 0 4px 20px rgba(0,0,0,.4);
    flex: 0 0 auto;
  }
  #grid {
    flex: 1 1 auto; width: 100%; max-width: 1100px; min-height: 0;
    display: grid; gap: 14px;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    align-content: center;
  }
  .tile {
    border-radius: 28px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; padding: 14px 8px;
    min-height: 120px;
    box-shadow: 0 8px 24px rgba(0,0,0,.30);
    animation: bob 2.6s ease-in-out infinite alternate;
    transition: transform .12s ease;
  }
  .tile:active { transform: scale(.94); }
  @keyframes bob { from { transform: translateY(-3px); } to { transform: translateY(3px); } }
  .tile .ico { font-size: clamp(44px, 7vw, 72px); line-height: 1; }
  .tile .lbl { font-size: clamp(15px, 2vw, 20px); font-weight: 800; color: #3a2a55; }
  @media (prefers-reduced-motion: reduce) { .tile, .star { animation: none; } }
</style>
</head>
<body>
<div id="sky"></div>
<div id="wrap">
  <h1>Juniper's Playroom ✨</h1>
  <div id="grid"></div>
</div>
<script src="common.js"></script>
<script>
(function () {
  "use strict";
  var sky = document.getElementById("sky");
  for (var i = 0; i < 45; i++) {
    var s = document.createElement("div");
    s.className = "star";
    var size = 1 + Math.random() * 2.2;
    s.style.width = size + "px"; s.style.height = size + "px";
    s.style.left = Math.random() * 100 + "%";
    s.style.top = Math.random() * 100 + "%";
    s.style.setProperty("--tw", (1.4 + Math.random() * 2.6).toFixed(2) + "s");
    s.style.animationDelay = (Math.random() * 3).toFixed(2) + "s";
    sky.appendChild(s);
  }

  var GAMES = [
    { href: "sparkles.html",  ico: "✨", lbl: "Sparkles",    bg: "linear-gradient(160deg,#ffd6e7,#ffb3c6)" },
    { href: "bubbles.html",   ico: "🫧", lbl: "Bubbles",     bg: "linear-gradient(160deg,#c8f4ff,#9bf6ff)" },
    { href: "animals.html",   ico: "🐮", lbl: "Animals",     bg: "linear-gradient(160deg,#e6ffd6,#caffbf)" },
    { href: "piano.html",     ico: "🎹", lbl: "Piano",       bg: "linear-gradient(160deg,#e8deff,#bdb2ff)" },
    { href: "fireworks.html", ico: "🎆", lbl: "Fireworks",   bg: "linear-gradient(160deg,#ffe3c2,#ffd6a5)" },
    { href: "monster.html",   ico: "😋", lbl: "Feed Me!",    bg: "linear-gradient(160deg,#ffd9fb,#ffc6ff)" },
    { href: "daynight.html",  ico: "🌙", lbl: "Day & Night", bg: "linear-gradient(160deg,#fffbc9,#fdffb6)" }
  ];

  var grid = document.getElementById("grid");
  GAMES.forEach(function (g, idx) {
    var t = document.createElement("div");
    t.className = "tile";
    t.style.background = g.bg;
    t.style.animationDelay = (idx * 0.25) + "s";
    t.innerHTML = '<div class="ico">' + g.ico + '</div><div class="lbl">' + g.lbl + '</div>';
    t.addEventListener("pointerup", function () {
      JS.tone({ freq: 660, type: "triangle", dur: 0.18, vol: 0.12 });
      setTimeout(function () { location.href = g.href; }, 80);
    });
    grid.appendChild(t);
  });

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }
})();
</script>
</body>
</html>

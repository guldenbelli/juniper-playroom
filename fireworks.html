<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#070514">
<title>Fireworks</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden; position: fixed; inset: 0;
    background: linear-gradient(180deg, #070514 0%, #120c2e 70%, #1d1145 100%);
    touch-action: none; overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent;
  }
  .star { position: absolute; border-radius: 50%; background: #fff; opacity: .4;
    animation: twinkle var(--tw) ease-in-out infinite alternate; }
  @keyframes twinkle { from { opacity: .1; } to { opacity: .6; } }
  #stage { position: absolute; inset: 0; }
  .rocket {
    position: absolute; width: 10px; height: 10px; border-radius: 50%;
    background: #fff; transform: translate(-50%, -50%);
    box-shadow: 0 0 12px 4px #ffd6a5, 0 14px 18px -2px #ff9d5c66, 0 26px 22px -6px #ff7b3922;
    transition: top .6s cubic-bezier(.3,.6,.4,1);
    pointer-events: none; will-change: top;
  }
  .flash {
    position: absolute; transform: translate(-50%, -50%);
    border-radius: 50%; pointer-events: none;
    background: radial-gradient(circle, rgba(255,255,255,.9) 0%, rgba(255,255,255,0) 70%);
    width: 30px; height: 30px;
    animation: flash .5s ease-out forwards;
  }
  @keyframes flash { to { width: 220px; height: 220px; opacity: 0; } }
  .pt {
    position: absolute; transform: translate(-50%, -50%);
    border-radius: 50%; pointer-events: none;
    width: var(--ps); height: var(--ps);
    background: var(--pc);
    box-shadow: 0 0 10px 2px var(--pc);
    animation: fly var(--pd) cubic-bezier(.1,.7,.3,1) forwards;
    will-change: transform, opacity;
  }
  @keyframes fly {
    0% { transform: translate(-50%,-50%) translate(0,0) scale(1); opacity: 1; }
    70% { opacity: 1; }
    100% { transform: translate(-50%,-50%) translate(var(--dx), calc(var(--dy) + 40px)) scale(.4); opacity: 0; }
  }
</style>
</head>
<body>
<div id="stage"></div>
<script src="common.js"></script>
<script>
(function () {
  "use strict";
  var stage = document.getElementById("stage");

  for (var i = 0; i < 60; i++) {
    var s = document.createElement("div");
    s.className = "star";
    var size = 1 + Math.random() * 2;
    s.style.width = size + "px"; s.style.height = size + "px";
    s.style.left = Math.random() * 100 + "%";
    s.style.top = Math.random() * 100 + "%";
    s.style.setProperty("--tw", (1.5 + Math.random() * 2.5).toFixed(2) + "s");
    s.style.animationDelay = (Math.random() * 3).toFixed(2) + "s";
    stage.appendChild(s);
  }

  var PALETTES = [
    ["#ff8fab", "#ffc2d4", "#ffffff"],
    ["#ffd166", "#ffe9b3", "#ffffff"],
    ["#7fd8f7", "#c3eeff", "#ffffff"],
    ["#c79bff", "#e6d4ff", "#ffffff"],
    ["#9ef0a0", "#d6ffd8", "#ffffff"]
  ];

  function explode(x, y) {
    var palette = JS.pick(PALETTES);
    var flash = document.createElement("div");
    flash.className = "flash";
    flash.style.left = x + "px"; flash.style.top = y + "px";
    flash.addEventListener("animationend", function () { flash.remove(); });
    stage.appendChild(flash);

    var n = 26;
    for (var i = 0; i < n; i++) {
      var p = document.createElement("div");
      p.className = "pt";
      var ang = (i / n) * Math.PI * 2 + JS.rand(-0.15, 0.15);
      var dist = JS.rand(70, 190);
      p.style.left = x + "px"; p.style.top = y + "px";
      p.style.setProperty("--pc", JS.pick(palette));
      p.style.setProperty("--ps", JS.rand(6, 13).toFixed(0) + "px");
      p.style.setProperty("--dx", (Math.cos(ang) * dist).toFixed(0) + "px");
      p.style.setProperty("--dy", (Math.sin(ang) * dist).toFixed(0) + "px");
      p.style.setProperty("--pd", JS.rand(0.8, 1.3).toFixed(2) + "s");
      p.addEventListener("animationend", function (e) { e.target.remove(); });
      stage.appendChild(p);
    }

    /* boom + crackles */
    JS.noise({ from: 350, to: 90, dur: 0.5, vol: 0.22, filter: "lowpass" });
    JS.tone({ freq: 180, slide: 60, type: "sine", dur: 0.45, vol: 0.16 });
    for (var c = 0; c < 5; c++) {
      JS.noise({ from: JS.rand(2200, 4200), to: 1400, dur: 0.05, vol: 0.05, delay: 0.12 + c * JS.rand(0.05, 0.1), filter: "bandpass", q: 4 });
    }
  }

  function launch(x, y) {
    var r = document.createElement("div");
    r.className = "rocket";
    r.style.left = x + "px";
    r.style.top = "102vh";
    stage.appendChild(r);
    JS.noise({ from: 500, to: 3000, dur: 0.55, vol: 0.09, filter: "bandpass", q: 1.5 });
    JS.tone({ freq: 300, slide: 900, type: "sine", dur: 0.55, vol: 0.05 });

    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        r.style.top = y + "px";
      });
    });
    r.addEventListener("transitionend", function () {
      r.remove();
      explode(x, y);
    });
    /* safety net in case transitionend is missed */
    setTimeout(function () {
      if (r.parentNode) { r.remove(); explode(x, y); }
    }, 900);
  }

  document.body.addEventListener("pointerdown", function (e) {
    var y = Math.max(e.clientY, 80); /* keep explosions on screen */
    launch(e.clientX, y);
  });

  JS.makeChips();
})();
</script>
</body>
</html>

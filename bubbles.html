<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#063f4f">
<title>Bubbles</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden; position: fixed; inset: 0;
    background: linear-gradient(180deg, #0a6e8a 0%, #0a4f6e 55%, #063f4f 100%);
    touch-action: none; overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent;
  }
  #stage { position: absolute; inset: 0; }
  .beam {
    position: absolute; top: -20%; width: 18vw; height: 140%;
    background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,0));
    transform: skewX(-12deg); pointer-events: none;
  }
  .bubble {
    position: absolute; bottom: -160px; border-radius: 50%;
    background: radial-gradient(circle at 32% 28%, rgba(255,255,255,.85) 0%, rgba(255,255,255,.25) 18%, rgba(180,235,255,.12) 45%, rgba(140,220,255,.20) 100%);
    box-shadow: inset 0 0 18px rgba(255,255,255,.35), 0 0 14px rgba(160,235,255,.18);
    animation: rise var(--rise) linear forwards;
    will-change: transform;
  }
  .bubble .sway {
    width: 100%; height: 100%; border-radius: 50%;
    animation: sway var(--sway) ease-in-out infinite alternate;
  }
  @keyframes rise { to { transform: translateY(calc(-100vh - 200px)); } }
  @keyframes sway { from { transform: translateX(calc(var(--amp) * -1)); } to { transform: translateX(var(--amp)); } }
  .popring {
    position: absolute; transform: translate(-50%, -50%);
    border: 4px solid rgba(255,255,255,.8); border-radius: 50%;
    width: 20px; height: 20px; pointer-events: none;
    animation: ring .45s ease-out forwards;
  }
  @keyframes ring { to { width: var(--rw); height: var(--rw); opacity: 0; border-width: 1px; } }
</style>
</head>
<body>
<div id="stage"></div>
<script src="common.js"></script>
<script>
(function () {
  "use strict";
  var stage = document.getElementById("stage");

  /* soft light beams */
  [12, 38, 70].forEach(function (left, i) {
    var b = document.createElement("div");
    b.className = "beam";
    b.style.left = left + "%";
    b.style.opacity = 0.5 + i * 0.15;
    stage.appendChild(b);
  });

  var DROPLET = { chars: ["•", "◦", "💧"], colors: ["#d6f6ff", "#a0e7e5", "#ffffff", "#9bf6ff"] };

  function plop() {
    JS.tone({ freq: JS.rand(500, 760), slide: 160, type: "sine", dur: 0.16, vol: 0.2 });
    JS.noise({ from: 1800, to: 600, dur: 0.08, vol: 0.06, filter: "bandpass", q: 2 });
  }

  function popBubble(b, x, y) {
    if (b.dataset.popped) return;
    b.dataset.popped = "1";
    b.remove();
    var ring = document.createElement("div");
    ring.className = "popring";
    ring.style.left = x + "px"; ring.style.top = y + "px";
    ring.style.setProperty("--rw", (b.clientWidth * 1.6 || 120) + "px");
    ring.addEventListener("animationend", function () { ring.remove(); });
    stage.appendChild(ring);
    JS.burst(x, y, { stage: stage, count: 9, chars: DROPLET.chars, colors: DROPLET.colors, distMin: 25, distMax: 80, sizeMin: 8, sizeMax: 20, dur: 0.6 });
    plop();
  }

  function spawnBubble() {
    if (stage.querySelectorAll(".bubble").length >= 14) return;
    var b = document.createElement("div");
    b.className = "bubble";
    var size = JS.rand(64, 150);
    b.style.width = size + "px"; b.style.height = size + "px";
    b.style.left = JS.rand(-2, 92) + "%";
    b.style.setProperty("--rise", JS.rand(6, 12).toFixed(1) + "s");
    b.style.setProperty("--sway", JS.rand(1.6, 3).toFixed(1) + "s");
    b.style.setProperty("--amp", JS.rand(10, 34).toFixed(0) + "px");
    b.appendChild(document.createElement("div")).className = "sway";
    b.addEventListener("animationend", function () { b.remove(); });
    b.addEventListener("pointerdown", function (e) {
      e.stopPropagation();
      popBubble(b, e.clientX, e.clientY);
    });
    stage.appendChild(b);
  }

  /* steady stream of bubbles */
  setInterval(spawnBubble, 650);
  for (var i = 0; i < 6; i++) setTimeout(spawnBubble, i * 220);

  /* tapping the water still does something */
  document.body.addEventListener("pointerdown", function (e) {
    JS.burst(e.clientX, e.clientY, { stage: stage, count: 4, chars: DROPLET.chars, colors: DROPLET.colors, distMin: 15, distMax: 45, sizeMin: 6, sizeMax: 14, dur: 0.5 });
    JS.tone({ freq: JS.rand(220, 330), slide: 140, type: "sine", dur: 0.12, vol: 0.07 });
  });

  /* dragging finger pops bubbles it crosses */
  document.body.addEventListener("pointermove", function (e) {
    var el = document.elementFromPoint(e.clientX, e.clientY);
    if (el) {
      var b = el.closest ? el.closest(".bubble") : null;
      if (b) popBubble(b, e.clientX, e.clientY);
    }
  });

  JS.makeChips();
})();
</script>
</body>
</html>
